<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faebot Dashboard</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #1f2940;
            --text-primary: #eee;
            --text-secondary: #aaa;
            --accent: #9d4edd;
            --accent-soft: #c77dff;
            --success: #4ade80;
            --warning: #fbbf24;
            --error: #f87171;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 1rem;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--bg-secondary);
            margin-bottom: 1.5rem;
        }
        
        h1 {
            color: var(--accent-soft);
            font-size: 1.75rem;
        }
        
        .status-badge {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .status-badge.connected {
            background: rgba(74, 222, 128, 0.2);
            color: var(--success);
        }
        
        .status-badge.disconnected {
            background: rgba(248, 113, 113, 0.2);
            color: var(--error);
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
        }
        
        .card h2 {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        /* Audio Controls */
        .audio-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .audio-button {
            padding: 1rem 2rem;
            font-size: 1.125rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        
        .audio-button.start {
            background: var(--accent);
            color: white;
        }
        
        .audio-button.start:hover {
            background: var(--accent-soft);
        }
        
        .audio-button.stop {
            background: var(--error);
            color: white;
        }
        
        .audio-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .audio-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }
        
        .audio-status .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-secondary);
        }
        
        .audio-status.recording .indicator {
            background: var(--error);
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Audio Visualizer */
        .visualizer-container {
            height: 80px;
            background: var(--bg-secondary);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 1rem;
        }
        
        #visualizer {
            width: 100%;
            height: 100%;
        }
        
        /* Transcription Log */
        .transcription-log {
            height: 300px;
            overflow-y: auto;
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 1rem;
        }
        
        .transcription-entry {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: var(--bg-card);
            border-radius: 6px;
            border-left: 3px solid var(--accent);
        }
        
        .transcription-entry .time {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }
        
        .transcription-entry .text {
            color: var(--text-primary);
        }
        
        .empty-state {
            color: var(--text-secondary);
            text-align: center;
            padding: 2rem;
            font-style: italic;
        }
        
        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-soft);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ Faebot Dashboard</h1>
            <span id="connectionStatus" class="status-badge disconnected">Disconnected</span>
        </header>
        
        <div class="grid">
            <div class="card">
                <h2>🎤 Audio Capture</h2>
                <div class="audio-controls">
                    <button id="startBtn" class="audio-button start" onclick="startCapture()">
                        Start Listening
                    </button>
                    <button id="stopBtn" class="audio-button stop" onclick="stopCapture()" disabled>
                        Stop Listening
                    </button>
                    <div id="audioStatus" class="audio-status">
                        <span class="indicator"></span>
                        <span class="label">Not recording</span>
                    </div>
                </div>
                <div class="visualizer-container">
                    <canvas id="visualizer"></canvas>
                </div>
                <div class="stats" style="margin-top: 1rem;">
                    <div class="stat">
                        <div id="chunksSent" class="stat-value">0</div>
                        <div class="stat-label">Chunks Sent</div>
                    </div>
                    <div class="stat">
                        <div id="bytesTotal" class="stat-value">0</div>
                        <div class="stat-label">KB Sent</div>
                    </div>
                    <div class="stat">
                        <div id="duration" class="stat-value">0:00</div>
                        <div class="stat-label">Duration</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h2>📝 Transcriptions</h2>
                <div id="transcriptionLog" class="transcription-log">
                    <div class="empty-state">
                        Transcriptions will appear here once audio capture starts...
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // State
        let audioContext = null;
        let mediaStream = null;
        let audioWorklet = null;
        let socket = null;
        let statusSocket = null;
        let isRecording = false;
        let chunksSent = 0;
        let bytesSent = 0;
        let startTime = null;
        let animationFrame = null;
        let analyser = null;
        
        // DOM elements
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const audioStatus = document.getElementById('audioStatus');
        const connectionStatus = document.getElementById('connectionStatus');
        const transcriptionLog = document.getElementById('transcriptionLog');
        const visualizer = document.getElementById('visualizer');
        const canvasCtx = visualizer.getContext('2d');
        
        // Connect to status WebSocket
        function connectStatusSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            statusSocket = new WebSocket(`${protocol}//${window.location.host}/ws/status`);
            
            statusSocket.onopen = () => {
                connectionStatus.textContent = 'Connected';
                connectionStatus.className = 'status-badge connected';
            };
            
            statusSocket.onclose = () => {
                connectionStatus.textContent = 'Disconnected';
                connectionStatus.className = 'status-badge disconnected';
                // Reconnect after 2 seconds
                setTimeout(connectStatusSocket, 2000);
            };
            
            statusSocket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                // Handle status updates if needed
            };
        }
        
        // Start audio capture
        async function startCapture() {
            try {
                // Request microphone access
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 16000
                    }
                });
                
                // Create audio context
                audioContext = new AudioContext({ sampleRate: 16000 });
                
                // Create analyser for visualization
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                
                const source = audioContext.createMediaStreamSource(mediaStream);
                source.connect(analyser);
                
                // Create script processor for capturing audio data
                // (AudioWorklet would be better but this is simpler for now)
                const processor = audioContext.createScriptProcessor(4096, 1, 1);
                
                // Connect to WebSocket
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                socket = new WebSocket(`${protocol}//${window.location.host}/ws/audio`);
                
                socket.onopen = () => {
                    console.log('Audio WebSocket connected');
                    
                    processor.onaudioprocess = (e) => {
                        if (!isRecording || socket.readyState !== WebSocket.OPEN) return;
                        
                        const inputData = e.inputBuffer.getChannelData(0);
                        
                        // Convert float32 to int16
                        const int16Data = new Int16Array(inputData.length);
                        for (let i = 0; i < inputData.length; i++) {
                            const s = Math.max(-1, Math.min(1, inputData[i]));
                            int16Data[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                        }
                        
                        // Send to server
                        socket.send(int16Data.buffer);
                        
                        // Update stats
                        chunksSent++;
                        bytesSent += int16Data.buffer.byteLength;
                        updateStats();
                    };
                    
                    source.connect(processor);
                    processor.connect(audioContext.destination);
                    
                    isRecording = true;
                    startTime = Date.now();
                    updateUI();
                    startVisualization();
                };
                
                socket.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.type === 'transcription') {
                        addTranscription(data.text);
                    }
                };
                
                socket.onclose = () => {
                    console.log('Audio WebSocket closed');
                    if (isRecording) {
                        stopCapture();
                    }
                };
                
                socket.onerror = (error) => {
                    console.error('Audio WebSocket error:', error);
                };
                
            } catch (error) {
                console.error('Error starting capture:', error);
                alert('Could not access microphone. Please check permissions.');
            }
        }
        
        // Stop audio capture
        function stopCapture() {
            isRecording = false;
            
            if (socket) {
                socket.close();
                socket = null;
            }
            
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
            
            updateUI();
        }
        
        // Update UI state
        function updateUI() {
            startBtn.disabled = isRecording;
            stopBtn.disabled = !isRecording;
            
            if (isRecording) {
                audioStatus.classList.add('recording');
                audioStatus.querySelector('.label').textContent = 'Recording...';
            } else {
                audioStatus.classList.remove('recording');
                audioStatus.querySelector('.label').textContent = 'Not recording';
            }
        }
        
        // Update statistics display
        function updateStats() {
            document.getElementById('chunksSent').textContent = chunksSent;
            document.getElementById('bytesTotal').textContent = (bytesSent / 1024).toFixed(1);
            
            if (startTime) {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                document.getElementById('duration').textContent = 
                    `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        }
        
        // Audio visualization
        function startVisualization() {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            const WIDTH = visualizer.width;
            const HEIGHT = visualizer.height;
            
            // Set canvas size to match display size
            visualizer.width = visualizer.offsetWidth;
            visualizer.height = visualizer.offsetHeight;
            
            function draw() {
                if (!isRecording) {
                    // Clear canvas when not recording
                    canvasCtx.fillStyle = '#16213e';
                    canvasCtx.fillRect(0, 0, visualizer.width, visualizer.height);
                    return;
                }
                
                animationFrame = requestAnimationFrame(draw);
                
                analyser.getByteFrequencyData(dataArray);
                
                canvasCtx.fillStyle = '#16213e';
                canvasCtx.fillRect(0, 0, visualizer.width, visualizer.height);
                
                const barWidth = (visualizer.width / bufferLength) * 2.5;
                let x = 0;
                
                for (let i = 0; i < bufferLength; i++) {
                    const barHeight = (dataArray[i] / 255) * visualizer.height;
                    
                    // Gradient from accent to accent-soft
                    const gradient = canvasCtx.createLinearGradient(0, visualizer.height, 0, 0);
                    gradient.addColorStop(0, '#9d4edd');
                    gradient.addColorStop(1, '#c77dff');
                    
                    canvasCtx.fillStyle = gradient;
                    canvasCtx.fillRect(x, visualizer.height - barHeight, barWidth, barHeight);
                    
                    x += barWidth + 1;
                }
            }
            
            draw();
        }
        
        // Add transcription to log
        function addTranscription(text) {
            // Remove empty state if present
            const emptyState = transcriptionLog.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
            
            const entry = document.createElement('div');
            entry.className = 'transcription-entry';
            
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `
                <div class="time">${time}</div>
                <div class="text">${text}</div>
            `;
            
            transcriptionLog.insertBefore(entry, transcriptionLog.firstChild);
        }
        
        // Initialize
        connectStatusSocket();
        
        // Update duration every second
        setInterval(() => {
            if (isRecording) {
                updateStats();
            }
        }, 1000);
    </script>
</body>
</html>
