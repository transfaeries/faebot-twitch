<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faebot Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/dashboard.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ Faebot Dashboard</h1>
            <span id="connectionStatus" class="status-badge disconnected">Disconnected</span>
        </header>

        <div class="card">
            <h2>🎤 Audio Capture</h2>
            <div class="audio-controls">
                <button id="startBtn" class="btn btn-primary">Start Listening</button>
                <button id="stopBtn" class="btn btn-danger" disabled>Stop</button>
            </div>
            <div id="audioStatus" class="audio-status">
                <span class="indicator"></span>
                <span class="label">Not recording</span>
            </div>
            <div class="visualizer">
                <canvas id="visualizer"></canvas>
            </div>
            <div class="stats">
                <div id="sessionStart" class="session-time">Not listening</div>
            </div>
        </div>

        <div class="card">
            <h2>📝 Transcriptions</h2>
            <div id="transcriptionLog" class="log">
                <div class="log-empty">Transcriptions will appear here...</div>
            </div>
        </div>
    </div>
</body>
</html>
